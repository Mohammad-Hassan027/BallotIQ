name: CI – Tests & jest-output.json validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Run tests & validate jest-output.json
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ballotiq

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ballotiq/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests and regenerate jest-output.json
        run: npx jest --json --outputFile=jest-output.json

      - name: Fail if jest-output.json is out of sync
        run: |
          if ! git diff --exit-code jest-output.json; then
            echo ""
            echo "=============================================="
            echo "ERROR: jest-output.json is out of sync."
            echo "Run 'npx jest --json --outputFile=jest-output.json'"
            echo "inside ballotiq/ and commit the updated file."
            echo "=============================================="
            exit 1
          fi
